    <style>
        /* Estilo geral da página - Centralizando o conteúdo */
        body {
            font-family: 'Segoe UI', Arial, sans-serif; /* Fonte mais moderna */
            background-color: #f0f4f8; /* Fundo leve e limpo */
            color: #333333;
            padding: 40px 20px; /* Mais respiro no topo e rodapé */

            align-items: center; /* Centraliza o formulário horizontalmente */

            text-align: center;
            margin-bottom: 30px;

        form {
            background-color: #ffffff;
            padding: 40px; /* Aumentamos o respiro interno */
            border-radius: 12px; /* Bordas mais suaves */
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); /* Sombra mais elegante e profunda */
            width: 100%;
            max-width: 650px; /* Largura perfeita para leitura confortável em coluna única */

        }

        /* Estilo dos rótulos */
        label {
            display: block;
            font-weight: bold;
            margin-top: 20px; /* Aumentado levemente para respirar na coluna única */
            margin-bottom: 8px;
            color: #444444; /* Cor levemente mais suave para leitura */

        /* Estilo das caixas de texto, áreas de texto e menu suspenso */
        input, select, textarea {
            width: 100%; 
            padding: 12px; /* Entradas levemente mais altas (melhor conforto de clique) */
            border: 1px solid #cccccc;
            border-radius: 6px; /* Bordas mais arredondadas */
            box-sizing: border-box; 
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s; /* Animação suave no foco */
        }

        /* UX: Feedback visual quando o usuário clica no campo */
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0056b3;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.15); /* "Aura" azul ao redor do campo ativo */
        }

        /* Estilo para os contadores de caracteres */
        .contador {
            font-size: 12px;
            color: #666666;
            text-align: right;
            margin-top: 4px;
            margin-bottom: 10px;

        /* --- ESTILOS DE VALIDAÇÃO DE ERRO --- */

        .campo-invalido {
            border: 2px solid #cc0000 !important;

        /* --- ESTILOS DO BOTÃO --- */
        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background-color 0.3s, transform 0.1s; /* Animação de clique */
        }

        button:hover {
            background-color: #004494; /* Escurece ao passar o mouse */
        }

        button:active {
            transform: scale(0.98); /* Botão "afunda" quando clicado */
        }

        /* --- ESTILOS DO AUTOCOMPLETE (MENU SUSPENSO) --- */
        .autocomplete-container {
            position: relative;
            display: block;
        }
        .autocomplete-items {
            position: absolute;
            border: 1px solid #cccccc;
            border-bottom: none;
            border-top: none;

        .autocomplete-items div {

            transition: background-color 0.2s;
        }
        .autocomplete-items div:hover {
            background-color: #0056b3;
            color: #ffffff; 
        }
        
    </style>

	<script>

// --- AUTO-PREENCHIMENTO AO CARREGAR A PÁGINA ---
// O window.onload é um gatilho. Ele diz: "Navegador, assim que terminar de ler o HTML, execute isso:"
window.onload = function() {
    let hoje = new Date(); // Captura o relógio interno do computador no momento exato
    
    let ano = hoje.getFullYear(); // Pega o ano (ex: 2026)
    
    // Na programação, os meses começam no zero (Janeiro = 0, Fevereiro = 1). 
    // Por isso somamos + 1. O "padStart(2, '0')" garante que o mês 5 vire "05".
    let mes = String(hoje.getMonth() + 1).padStart(2, '0'); 
    
    let dia = String(hoje.getDate()).padStart(2, '0'); // O mesmo para o dia
    
    // O campo HTML do tipo "date" exige que o formato seja escrito em inglês (AAAA-MM-DD)
    let dataFormatadaPadrao = ano + '-' + mes + '-' + dia;
    
    // Injeta a data formatada diretamente na caixa de texto na tela
    document.getElementById('dataSolicitacao').value = dataFormatadaPadrao;

    // NOVA FUNÇÃO: Preparando o "Ouvinte" de digitação
    function iniciarContador(idCampo, idContador, limite) {
        let campo = document.getElementById(idCampo);
        let contador = document.getElementById(idContador);

        // O 'addEventListener' escuta especificamente o evento 'input' (quando qualquer tecla é digitada ou apagada)
        campo.addEventListener('input', function() {
            let quantidadeDigitada = campo.value.length; // Conta quantas letras existem no campo agora
            
            // Atualiza o texto na tela
            contador.innerText = quantidadeDigitada + " / " + limite;
            
            // Bônus de UX: Se chegar no limite, o texto fica vermelho para alertar o médico
            if (quantidadeDigitada >= limite) {
                contador.style.color = "red";
                contador.style.fontWeight = "bold";
            } else {
                contador.style.color = "#666666"; // Volta pro cinza se ele apagar letras
                contador.style.fontWeight = "normal";
            }
        });
    }

    // Ativando a máquina para os nossos 4 campos (passando o ID do campo, o ID do contador e o Limite Máximo)
    iniciarContador('sinaisSintomas', 'cont-sinaisSintomas', 1000);
    iniciarContador('condicoesInternacao', 'cont-condicoesInternacao', 400);
    iniciarContador('principaisResultados', 'cont-principaisResultados', 400);
	
// --- BANCO DE DADOS DE CIDS (Amostra do MVP) ---
// Regra SUS: CIDs de 3 letras ganham um "X" no final para preencher os 4 quadradinhos
// --- O NOSSO BANCO DE DADOS AGORA COMEÇA VAZIO ---
    let bancoCids = [];

    // --- NOVA FUNÇÃO QUE CONSOME A API / ARQUIVO JSON ---
    async function carregarBancoCids() {
    try {
        let resposta = await fetch('cid10-csv-teste1.json');
        let dadosBrutos = await resposta.json();
        
        bancoCids = dadosBrutos.map(doenca => {
            let partes = doenca[Object.keys(doenca)[0]].split(';');
            return {
                codigo: partes[0],
                nome: partes[4]
            };
        });
        
        console.log("Banco de CIDs carregado com sucesso! Total:", bancoCids.length);
    } catch (erro) {
        console.error("Erro ao carregar o arquivo:", erro);
    }
}

    // Chama a função para carregar os dados assim que a página abrir
    carregarBancoCids();    // (Mantenha o seu array const bancoCids = [...] exatamente como está)

    // NOVA LÓGICA DE AUTOCOMPLETE DUPLO E SINCRONIZADO
    function iniciarAutocompleteSincronizado(idCampoBusca, idLista) {
        let campoBusca = document.getElementById(idCampoBusca);
        let lista = document.getElementById(idLista);
        let campoDiagnostico = document.getElementById('diagnosticoInicial');
        let campoCidVisivel = document.getElementById('buscaCidPrincipal');
        let campoCidEscondido = document.getElementById('cidPrincipal');

        // Escuta a digitação no campo
        campoBusca.addEventListener('input', function() {
            let valor = this.value.toLowerCase();
            lista.innerHTML = '';
            campoCidEscondido.value = ''; // Reseta o código oficial se o médico alterar o texto

            if (!valor) return;

            let resultados = bancoCids.filter(cid => 
                cid.codigo.toLowerCase().includes(valor) || 
                cid.nome.toLowerCase().includes(valor)
            );

            resultados.forEach(cid => {
                let item = document.createElement('div');
                item.innerHTML = `<strong>${cid.codigo}</strong> - ${cid.nome}`;
                
                // O QUE ACONTECE AO CLICAR NA DOENÇA?
                item.addEventListener('click', function() {
                    
                    // 1. Injeta o Nome da Doença no campo de Diagnóstico
                    campoDiagnostico.value = cid.nome;
                    
                    // 2. Injeta o Código do CID no campo visível do formulário
                    campoCidVisivel.value = cid.codigo;
                    
                    // 3. Força o contador de caracteres a recalcular PRIMEIRO!
                    campoDiagnostico.dispatchEvent(new Event('input'));
                    
                    // 4. Salva o Código invisível DEPOIS do evento, para não ser apagado por acidente!
                    campoCidEscondido.value = cid.codigo;
                    
                    // 5. Remove qualquer alerta de erro vermelho dos campos
                    campoDiagnostico.classList.remove('campo-invalido');
                    campoCidVisivel.classList.remove('campo-invalido');
                    
                    // 6. Fecha ambos os menus suspensos
                    document.getElementById('listaDiagnostico').innerHTML = '';
                    document.getElementById('listaCidPrincipal').innerHTML = '';
                });
                
                lista.appendChild(item);
            });
        });
    }

    // Ativamos a mesma inteligência para os DOIS campos do formulário
    iniciarAutocompleteSincronizado('diagnosticoInicial', 'listaDiagnostico');
    iniciarAutocompleteSincronizado('buscaCidPrincipal', 'listaCidPrincipal');

    // Fechar os menus caso o médico clique em qualquer lugar fora da caixa
    document.addEventListener('click', function(e) {
        if (e.target.id !== 'diagnosticoInicial' && e.target.id !== 'buscaCidPrincipal') {
            document.getElementById('listaDiagnostico').innerHTML = '';
            document.getElementById('listaCidPrincipal').innerHTML = '';
        }
    });
	
};

// --- O BANCO DE DADOS DO SIGTAP AGORA COMEÇA VAZIO ---
    let bancoProcedimentos = [];

// --- FUNÇÃO QUE CONSOME O ARQUIVO BRUTO DO SIGTAP ---
    async function carregarBancoProcedimentos() {
        try {
            // Lemos o arquivo como TEXTO puro, pois ele é um arquivo posicional do DATASUS
            let resposta = await fetch('sigtap.json');
            let textoBruto = await resposta.text();
            
            // Quebramos o texto gigante em uma lista, separando linha por linha (Enter)
            let linhas = textoBruto.split('\n');
            
            bancoProcedimentos = [];

            // Lemos cada linha individualmente
            linhas.forEach(linha => {
                // Ignora linhas vazias no final do documento
                if (linha.trim() === '') return;

                // REGRA DATASUS: Os primeiros 10 caracteres sempre são o Código (0 a 10)
                let codigoBruto = linha.substring(0, 10).trim();
                
                // REGRA DATASUS: A descrição tem exatos 250 caracteres (da posição 10 até a 260)
                // O ".trim()" no final joga fora todos os espaços vazios que sobrarem.
                let nomeBruto = linha.substring(10, 260).trim();

                // Salva no nosso banco se houver um código válido
                if (codigoBruto !== '') {
                    bancoProcedimentos.push({
                        codigo: codigoBruto,
                        nome: nomeBruto
                    });
                }
            });
            
            console.log("Banco SIGTAP Posicional carregado com sucesso! Total:", bancoProcedimentos.length);
        } catch (erro) {
            console.error("Erro ao carregar o arquivo sigtap.json:", erro);
        }
    }
    // Chama a função para carregar os dados assim que a página abrir
    carregarBancoProcedimentos();

    // --- NOVA LÓGICA DE AUTOCOMPLETE PARA PROCEDIMENTOS ---
    function iniciarAutocompleteProcedimento(idCampoBusca, idLista) {
        let campoBusca = document.getElementById(idCampoBusca);
        let lista = document.getElementById(idLista);
        let campoDescricao = document.getElementById('descricaoProcedimento');
        let campoCodigoVisivel = document.getElementById('buscaCodigoProcedimento');
        let campoCodigoEscondido = document.getElementById('codigoProcedimento');

        campoBusca.addEventListener('input', function() {
            let valor = this.value.toLowerCase();
            lista.innerHTML = '';
            campoCodigoEscondido.value = ''; // Apaga o invisível se houver alteração

            if (!valor) return;

            let resultados = bancoProcedimentos.filter(proc => 
                proc.codigo.includes(valor) || 
                proc.nome.toLowerCase().includes(valor)
            );

            resultados.forEach(proc => {
                let item = document.createElement('div');
                item.innerHTML = `<strong>${proc.codigo}</strong> - ${proc.nome}`;
                
                item.addEventListener('click', function() {
                    campoDescricao.value = proc.nome;
                    campoCodigoVisivel.value = proc.codigo;
                    
                    campoCodigoEscondido.value = proc.codigo;         // 2. Salva o código seguro
                    
                    campoDescricao.classList.remove('campo-invalido');
                    campoCodigoVisivel.classList.remove('campo-invalido');
                    
                    document.getElementById('listaDescricaoProcedimento').innerHTML = '';
                    document.getElementById('listaCodigoProcedimento').innerHTML = '';
                });
                
                lista.appendChild(item);
            });
        });
    }

    // Ativa os dois campos de procedimento
    iniciarAutocompleteProcedimento('descricaoProcedimento', 'listaDescricaoProcedimento');
    iniciarAutocompleteProcedimento('buscaCodigoProcedimento', 'listaCodigoProcedimento');

    // Fechar os menus caso o médico clique em qualquer lugar fora da caixa
    document.addEventListener('click', function(e) {
        if (e.target.id !== 'diagnosticoInicial' && e.target.id !== 'buscaCidPrincipal') {
            document.getElementById('listaDiagnostico').innerHTML = '';
            document.getElementById('listaCidPrincipal').innerHTML = '';
        }
        if (e.target.id !== 'descricaoProcedimento' && e.target.id !== 'buscaCodigoProcedimento') {
            document.getElementById('listaDescricaoProcedimento').innerHTML = '';
            document.getElementById('listaCodigoProcedimento').innerHTML = '';
        }
    });
	
// 1. O NOSSO MAPA DE COORDENADAS (Atualizado)
const mapaAih = {

// --- NOSSA NOVA FUNÇÃO REUTILIZÁVEL ---
// Ela recebe três ingredientes: o texto que foi digitado, as configurações do mapa e a página do PDF
function imprimirTextoEspacado(texto, configuracaoMapa, pagina) {
    if (!texto) return; // Se o médico não digitou nada, a função para aqui e não dá erro
    
    let textoString = String(texto).toUpperCase(); // Já transforma tudo em Maiúsculo (ex: j159 vira J159)
    
    for (let i = 0; i < textoString.length; i++) {
        let digito = textoString[i];
        let posicaoX = configuracaoMapa.x + (i * configuracaoMapa.espacamento);
        
        pagina.drawText(digito, { 
            x: posicaoX, 
            y: configuracaoMapa.y, 
            size: configuracaoMapa.tamanho 
        });
    }
}

// 2. A FUNÇÃO PRINCIPAL
async function capturarDados() {
    
    let divErro = document.getElementById('mensagemErro');

    // --- NOVA MINI-FUNÇÃO INTERNA PARA DISPARAR ERROS (D.R.Y.) ---
    // Em vez de copiar 5 linhas de código de erro toda vez, nós chamamos esta função
    function bloquearComErro(elemento, mensagem) {
        divErro.textContent = mensagem;
        divErro.style.display = 'block';
        elemento.classList.add('campo-invalido');
        elemento.scrollIntoView({ behavior: 'smooth', block: 'center' });
        elemento.focus();
    }

    // --- 1. VALIDAÇÃO DE CAMPOS VAZIOS OBRIGATÓRIOS ---
    const camposParaValidar = [
        { id: 'nomeEstabelecimento', nome: 'Nome do Estabelecimento Solicitante' },
        { id: 'nomePaciente', nome: 'Nome do Paciente' },
        { id: 'cnsPaciente', nome: 'Cartão Nacional de Saúde (CNS)' },
        { id: 'dataNascimento', nome: 'Data de Nascimento' },
        { id: 'sexoPaciente', nome: 'Sexo' },
        { id: 'nomeMae', nome: 'Nome da Mãe' },
        { id: 'municipioResidencia', nome: 'Município de Residência' },
        { id: 'sinaisSintomas', nome: 'Principais Sinais e Sintomas Clínicos' },
        { id: 'condicoesInternacao', nome: 'Condições que Justificam a Internação' },
        { id: 'principaisResultados', nome: 'Principais Resultados e Provas Diagnósticas' },
        { id: 'diagnosticoInicial', nome: 'Diagnóstico Inicial' },
        { id: 'buscaCidPrincipal', nome: 'CID 10 Principal' },
        { id: 'descricaoProcedimento', nome: 'Descrição do Procedimento Solicitado' },
        { id: 'buscaCodigoProcedimento', nome: 'Código do Procedimento (SIGTAP)' }, // Atualizado
        { id: 'clinica', nome: 'Clínica' },
        { id: 'caraterInternacao', nome: 'Caráter da Internação' },
        { id: 'tipoDocumentoProfissional', nome: 'Tipo de Documento do Profissional' },
        { id: 'numeroDocProfissional', nome: 'Nº Documento (CNS/CPF) do Profissional' },
        { id: 'nomeProfissional', nome: 'Nome do Profissional Solicitante' },
        { id: 'dataSolicitacao', nome: 'Data da Solicitação' }
    ];

    // Limpeza de segurança antes de checar
    divErro.style.display = 'none';
    camposParaValidar.forEach(campo => {
        document.getElementById(campo.id).classList.remove('campo-invalido');
    });

    // Verificação de vazios usando a nossa nova mini-função
    for (let i = 0; i < camposParaValidar.length; i++) {
        let elemento = document.getElementById(camposParaValidar[i].id);
        let valor = elemento.value.trim();

        if (valor === '') {
            bloquearComErro(elemento, `Processo interrompido: O campo "${camposParaValidar[i].nome}" é de preenchimento obrigatório.`);
            return; // Encerra a função
        }
    }

    // --- 2. VALIDAÇÃO ESPECÍFICA DE TAMANHO DE NÚMEROS (NOVO) ---
    
    // A. Validando o CNS do Paciente (!== significa "Diferente de")
    let cnsPacienteElem = document.getElementById('cnsPaciente');
    if (cnsPacienteElem.value.trim().length !== 15) {
        bloquearComErro(cnsPacienteElem, "Erro de formatação: O Cartão Nacional de Saúde (CNS) do paciente deve conter exatamente 15 dígitos.");
        return;
    }

    // B. Validando o Documento do Profissional (Inteligência Condicional)
    let tipoDocSelecionado = document.getElementById('tipoDocumentoProfissional').value;
    let numDocProfElem = document.getElementById('numeroDocProfissional');
    let numDocProfValor = numDocProfElem.value.trim();

    if (tipoDocSelecionado === 'CNS' && numDocProfValor.length !== 15) {
        bloquearComErro(numDocProfElem, "Erro de formatação: O CNS do profissional deve conter exatamente 15 dígitos.");
        return;
    } else if (tipoDocSelecionado === 'CPF' && numDocProfValor.length !== 11) {
        bloquearComErro(numDocProfElem, "Erro de formatação: O CPF do profissional deve conter exatamente 11 dígitos.");
        return;
    }
	
	// C. Validando o Código do Procedimento (SIGTAP)
    let codigoProcElemVisivel = document.getElementById('buscaCodigoProcedimento');
    let codigoProcEscondido = document.getElementById('codigoProcedimento').value;

    if (codigoProcEscondido.length !== 10) {
        bloquearComErro(codigoProcElemVisivel, "Erro de Validação: Você deve selecionar um Procedimento válido na lista suspensa (SIGTAP de 10 dígitos).");
        return;
    }
	
	// D. Validando o CNES do Estabelecimento (Opcional, mas estrito a 7 dígitos)
    let cnesElem = document.getElementById('cnesEstabelecimento');
    let cnesValor = cnesElem.value.trim();

    // Se o médico preencheu alguma coisa E essa coisa não tiver 7 dígitos, bloqueie!
    if (cnesValor !== '' && cnesValor.length !== 7) {
        bloquearComErro(cnesElem, "Erro de formatação: O CNES do estabelecimento deve conter exatamente 7 dígitos.");
        return;
    }
	
	// E. Validando se o CID Principal foi selecionado na lista (Menu Suspenso)
    let cidEscondidoValor = document.getElementById('cidPrincipal').value;
    let cidBuscaElem = document.getElementById('buscaCidPrincipal');
    
    // Se o usuário digitou algo, mas o código escondido está vazio, significa que ele não clicou no menu!
    if (cidBuscaElem.value !== '' && cidEscondidoValor === '') {
        bloquearComErro(cidBuscaElem, "Erro de Validação: Você deve selecionar uma doença válida na lista suspensa do CID 10 Principal.");
        return;
    }
	
    // --- FIM DA VALIDAÇÃO ---

    // Captura os dados digitados
	let nomeEstabelecimento = document.getElementById('nomeEstabelecimento').value;
	let cnesEstabelecimento = document.getElementById('cnesEstabelecimento').value;
    let nome = document.getElementById('nomePaciente').value;
    let cns = document.getElementById('cnsPaciente').value;
    let dataNasc = document.getElementById('dataNascimento').value;
    let sexo = document.getElementById('sexoPaciente').value;
    let nomeMae = document.getElementById('nomeMae').value;             
    let municipioResidencia = document.getElementById('municipioResidencia').value; 
    let sinaisSintomas = document.getElementById('sinaisSintomas').value.replace(/[\r\n]+/g, ' ').trim();
    let condicoesInternacao = document.getElementById('condicoesInternacao').value.replace(/[\r\n]+/g, ' ').trim();
    let principaisResultados = document.getElementById('principaisResultados').value.replace(/[\r\n]+/g, ' ').trim();
    let diagnosticoInicial = document.getElementById('diagnosticoInicial').value;
    let cidPrincipal = document.getElementById('cidPrincipal').value;
	let cidSecundario = document.getElementById('cidSecundario').value;
    let cidCausasAssociadas = document.getElementById('cidCausasAssociadas').value;
	let descricaoProcedimento = document.getElementById('descricaoProcedimento').value;
    let codigoProcedimento = document.getElementById('codigoProcedimento').value;
    let clinica = document.getElementById('clinica').value;
    let caraterInternacao = document.getElementById('caraterInternacao').value; 
	let tipoDocumentoProfissional = document.getElementById('tipoDocumentoProfissional').value;
    let numeroDocProfissional = document.getElementById('numeroDocProfissional').value;
	let nomeProfissional = document.getElementById('nomeProfissional').value;
	let dataSolicitacao = document.getElementById('dataSolicitacao').value;
	
	// --- CARREGA O PDF FIXO DO SERVIDOR ---
    // O fetch busca o arquivo na mesma pasta. Se você deu outro nome ao PDF no Passo 1, mude aqui!
    let respostaPdf = await fetch('aih_base.pdf'); 
    
    // Converte o PDF baixado para a linguagem binária que a biblioteca entende
    let arrayBuffer = await respostaPdf.arrayBuffer(); 
    let pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
    let primeiraPagina = pdfDoc.getPages()[0];
	
	// NOVO: Embutindo a fonte padrão explícita (A nossa "Régua" matemática)
    let fontePadrao = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);

// 3. CARIMBANDO OS DADOS USANDO O NOSSO MAPA ATUALIZADO
	primeiraPagina.drawText(nomeEstabelecimento, { 
        x: mapaAih.nomeEstabelecimento.x, 
        y: mapaAih.nomeEstabelecimento.y, 
        size: mapaAih.nomeEstabelecimento.tamanho 
    });

	// Imprimindo o CNES usando nossa função de quadradinhos
    imprimirTextoEspacado(cnesEstabelecimento, mapaAih.cnesEstabelecimento, primeiraPagina);

    primeiraPagina.drawText(nome, { 
        x: mapaAih.nome.x, 
        y: mapaAih.nome.y, 
        size: mapaAih.nome.tamanho // Busca o tamanho específico do Nome
    });
    
// --- NOVA LÓGICA DO CNS COM LAÇO DE REPETIÇÃO ---
    if(cns) {
        let stringCns = String(cns); // Garante que o computador trate o número como texto
        
        // O Loop "for": (Começa no 0; Vai até o fim da palavra; Anda de 1 em 1)
        for (let i = 0; i < stringCns.length; i++) {
            let digito = stringCns[i]; // Pega apenas uma letra/número por vez
            
            // Calcula a posição X exata: Posição inicial + (Qual número é * Tamanho do passo)
            let posicaoX = mapaAih.cns.x + (i * mapaAih.cns.espacamento);
            
            primeiraPagina.drawText(digito, { 
                x: posicaoX, 
                y: mapaAih.cns.y, 
                size: mapaAih.cns.tamanho 
            });
        }
    }

    if(dataNasc) {
        let partesData = dataNasc.split('-'); 
        let dataFormatada = partesData[2] + '/' + partesData[1] + '/' + partesData[0];
        primeiraPagina.drawText(dataFormatada, { 
            x: mapaAih.dataNasc.x, 
            y: mapaAih.dataNasc.y, 
            size: mapaAih.dataNasc.tamanho // Busca o tamanho específico da Data
        });
    }

// --- NOVA LÓGICA PARA AS CAIXAS DE SELEÇÃO DO SEXO ---
    // Se o médico escolheu "M" no formulário web...
    if (sexo === 'M') {
        // Imprime um "X" na coordenada do sexo masculino
        primeiraPagina.drawText('X', { 
            x: mapaAih.sexoMasc.x, 
            y: mapaAih.sexoMasc.y, 
            size: mapaAih.sexoMasc.tamanho 
        });
    } 
    // Caso contrário, se o médico escolheu "F"...
    else if (sexo === 'F') {
        // Imprime um "X" na coordenada do sexo feminino
        primeiraPagina.drawText('X', { 
            x: mapaAih.sexoFem.x, 
            y: mapaAih.sexoFem.y, 
            size: mapaAih.sexoFem.tamanho 
        });
    }
    
	// Carimbando o Nome da Mãe
    primeiraPagina.drawText(nomeMae, { 
        x: mapaAih.nomeMae.x, 
        y: mapaAih.nomeMae.y, 
        size: mapaAih.nomeMae.tamanho 
    });
	
	// Carimbando o Município de Residência
    primeiraPagina.drawText(municipioResidencia, { 
        x: mapaAih.municipioResidencia.x, 
        y: mapaAih.municipioResidencia.y, 
        size: mapaAih.municipioResidencia.tamanho 
    });

// --- IMPRESSÃO DO BLOCO 3 ---
    primeiraPagina.drawText(sinaisSintomas, { 
        x: mapaAih.sinaisSintomas.x, 
        y: mapaAih.sinaisSintomas.y, 
        size: mapaAih.sinaisSintomas.tamanho,
        maxWidth: mapaAih.sinaisSintomas.larguraMaxima, 
        lineHeight: mapaAih.sinaisSintomas.alturaLinha,
        font: fontePadrao,                // Entregando a régua para o sistema
        wordBreaks: [' ', '-']      // Entregando a tesoura (espaços, enter e hífens)
    });

    primeiraPagina.drawText(condicoesInternacao, { 
        x: mapaAih.condicoesInternacao.x, 
        y: mapaAih.condicoesInternacao.y, 
        size: mapaAih.condicoesInternacao.tamanho,
        maxWidth: mapaAih.condicoesInternacao.larguraMaxima, 
        lineHeight: mapaAih.condicoesInternacao.alturaLinha,
        font: fontePadrao,
        wordBreaks: [' ', '-']
    });

    primeiraPagina.drawText(principaisResultados, { 
        x: mapaAih.principaisResultados.x, 
        y: mapaAih.principaisResultados.y, 
        size: mapaAih.principaisResultados.tamanho,
        maxWidth: mapaAih.principaisResultados.larguraMaxima, 
        lineHeight: mapaAih.principaisResultados.alturaLinha,
        font: fontePadrao,
        wordBreaks: [' ', '-']
    });

    primeiraPagina.drawText(diagnosticoInicial, { 
        x: mapaAih.diagnosticoInicial.x, 
        y: mapaAih.diagnosticoInicial.y, 
        size: mapaAih.diagnosticoInicial.tamanho 
    });

// IMPRIMINDO OS CIDs USANDO A NOSSA FUNÇÃO REUTILIZÁVEL
    imprimirTextoEspacado(cidPrincipal, mapaAih.cidPrincipal, primeiraPagina);
    imprimirTextoEspacado(cidSecundario, mapaAih.cidSecundario, primeiraPagina);
    imprimirTextoEspacado(cidCausasAssociadas, mapaAih.cidCausasAssociadas, primeiraPagina);

// --- IMPRESSÃO DO BLOCO 4 ---
    primeiraPagina.drawText(descricaoProcedimento, { 
        x: mapaAih.descricaoProcedimento.x, 
        y: mapaAih.descricaoProcedimento.y, 
        size: mapaAih.descricaoProcedimento.tamanho 
    });

    primeiraPagina.drawText(clinica, { 
        x: mapaAih.clinica.x, 
        y: mapaAih.clinica.y, 
        size: mapaAih.clinica.tamanho 
    });

    // Lógica do Código do Procedimento (SIGTAP) - Loop de espaçamento
    if(codigoProcedimento) {
        let stringCodigo = String(codigoProcedimento); 
        for (let i = 0; i < stringCodigo.length; i++) {
            let digito = stringCodigo[i];
            let posicaoX = mapaAih.codigoProcedimento.x + (i * mapaAih.codigoProcedimento.espacamento);
            primeiraPagina.drawText(digito, { 
                x: posicaoX, 
                y: mapaAih.codigoProcedimento.y, 
                size: mapaAih.codigoProcedimento.tamanho 
            });
        }
    }

	// Lógica do Caráter de Internação (Texto Completo em Maiúsculas)
    if (caraterInternacao !== "") {
        // Transforma a palavra capturada (ex: "Eletiva") em tudo maiúsculo ("ELETIVA")
        let textoCarater = String(caraterInternacao).toUpperCase();
        
        primeiraPagina.drawText(textoCarater, { 
            x: mapaAih.caraterInternacao.x, 
            y: mapaAih.caraterInternacao.y, 
            size: mapaAih.caraterInternacao.tamanho 
        });
    }

// --- IMPRESSÃO DO BLOCO 5 ---
    // Lógica para assinalar o tipo de documento do profissional
    if (tipoDocumentoProfissional === 'CNS') {
        primeiraPagina.drawText('X', { 
            x: mapaAih.docProfissionalCns.x, 
            y: mapaAih.docProfissionalCns.y, 
            size: mapaAih.docProfissionalCns.tamanho 
        });
    } else if (tipoDocumentoProfissional === 'CPF') {
        primeiraPagina.drawText('X', { 
            x: mapaAih.docProfissionalCpf.x, 
            y: mapaAih.docProfissionalCpf.y, 
            size: mapaAih.docProfissionalCpf.tamanho 
        });
    }
	// Imprimindo o número do documento com espaçamento
    imprimirTextoEspacado(numeroDocProfissional, mapaAih.numeroDocProfissional, primeiraPagina);

	// Imprimindo o Nome do Profissional
    primeiraPagina.drawText(nomeProfissional, { 
        x: mapaAih.nomeProfissional.x, 
        y: mapaAih.nomeProfissional.y, 
        size: mapaAih.nomeProfissional.tamanho 
    });
	
	// Imprimindo a Data da Solicitação invertida para DD/MM/AAAA
    if(dataSolicitacao) {
        let partesDataSol = dataSolicitacao.split('-'); 
        let dataSolFormatada = partesDataSol[2] + '/' + partesDataSol[1] + '/' + partesDataSol[0];
        
        primeiraPagina.drawText(dataSolFormatada, { 
            x: mapaAih.dataSolicitacao.x, 
            y: mapaAih.dataSolicitacao.y, 
            size: mapaAih.dataSolicitacao.tamanho 
        });
    }

    // Salva e faz o download
    let pdfBytes = await pdfDoc.save();
    let blob = new Blob([pdfBytes], { type: "application/pdf" });
    let link = document.createElement('a');
    link.href = window.URL.createObjectURL(blob);
    link.download = "AIH_Preenchida.pdf";
    link.click();

    // DISPARO DE EVENTO PARA O GOOGLE ANALYTICS - QUANTIFICA DOWNLOADS COM SUCESSO
    // O "if" garante que o site não trave caso o médico use um bloqueador de anúncios (AdBlock)
    if (typeof gtag === 'function') {
        gtag('event', 'geracao_aih_sucesso', {
            'tipo_documento': 'pdf_aih_sus',
            'origem': 'botao_gerar'
        });
    }
}
